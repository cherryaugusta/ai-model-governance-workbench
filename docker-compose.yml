services:
  db:
    image: postgres:17
    container_name: amgw_db
    environment:
      POSTGRES_DB: governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4
    container_name: amgw_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
